name: Terraform CI/CD

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "**.tf"
      - "src/**"
      - "*.hcl"
      - "*.tfvars"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "**.tf"
      - "src/**"
      - "*.hcl"
      - "*.tfvars"
      - ".github/workflows/terraform-ci.yml"

permissions:
  id-token: write # requis pour l'authentification OIDC vers AWS
  contents: read
  pull-requests: write # pour poster le plan en commentaire de PR

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "eu-west-3" # Région Europe (Paris) — adaptez si besoin

jobs:
  set-env:
    name: Determine target environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
    steps:
      - id: resolve
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (backend-less, validation only)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Security scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        continue-on-error: true

  plan:
    name: Terraform Plan
    needs: [validate, set-env]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      TARGET_ENV: ${{ needs.set-env.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420905172927:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config=${{ env.TARGET_ENV }}.hcl

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -var-file=${{ env.TARGET_ENV }}.tfvars -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan — environnement \`${{ env.TARGET_ENV }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    needs: [validate, set-env]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: ${{ needs.set-env.outputs.env_name }}
    env:
      TARGET_ENV: ${{ needs.set-env.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config=${{ env.TARGET_ENV }}.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=${{ env.TARGET_ENV }}.tfvars

      - name: Output frontend URL
        run: terraform output frontend_url
